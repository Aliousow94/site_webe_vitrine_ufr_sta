{% extends "admin/base.html" %}
{% block title %}Modifier l'activité{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('dashboard') }}">Tableau de bord</a> / <a href="{{ url_for('liste_activite') }}">Activités</a> / Modifier{% endblock %}

{% block contenu %}
<div class="page-header">
    <h2>Modifier l'activité</h2>
    <a href="{{ url_for('liste_activite') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="admin-card">
    <div class="card-header"><h3><i class="bi bi-pencil-square"></i> Modifier</h3></div>
    <div class="card-body">
        <form method="POST" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" name="titre" value="{{ activite.titre }}" required>
                </div>
                <div class="form-group">
                    <label for="date_activite">Date</label>
                    <input type="date" id="date_activite" name="date_activite" value="{{ activite.date_activite }}" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="lieu">Lieu</label>
                    <input type="text" id="lieu" name="lieu" value="{{ activite.lieu }}" required>
                </div>
                <div class="form-group">
                    <label for="organisateur">Organisateur</label>
                    <input type="text" id="organisateur" name="organisateur" value="{{ activite.organisateur }}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="6" required>{{ activite.description }}</textarea>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('liste_activite') }}" class="btn btn-secondary">Annuler</a>
                
                <a href="{{ url_for('gestion_photos_activite', activite_id=activite.id) }}" class="btn btn-info">
                    <i class="bi bi-camera"></i> Gérer les photos
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
