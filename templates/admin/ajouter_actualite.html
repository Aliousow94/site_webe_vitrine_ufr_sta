{% extends "admin/base.html" %}
{% block title %}Ajouter une actualité{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('dashboard') }}">Tableau de bord</a> / <a href="{{ url_for('liste_actualite') }}">Actualités</a> / Ajouter{% endblock %}

{% block contenu %}
<div class="page-header">
    <h2>Ajouter une actualité</h2>
    <a href="{{ url_for('liste_actualite') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="admin-card">
    <div class="card-header"><h3><i class="bi bi-plus-circle"></i> Nouvelle actualité</h3></div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="titre">Titre</label>
                    <input type="text" id="titre" name="titre" placeholder="Titre de l'actualité" required>
                </div>
                <div class="form-group">
                    <label for="date_publication">Date de publication</label>
                    <input type="date" id="date_publication" name="date_publication" required>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="6" placeholder="Décrivez l'actualité..." required></textarea>
            </div>

            <div class="form-group">
                <label for="photo">Photo</label>
                <div class="file-input-wrap">
                    <input type="file" id="photo" name="photo" accept="image/*" required onchange="previewImage(this, 'previewImg')">
                    <label for="photo" class="file-label">
                        <i class="bi bi-cloud-upload"></i>
                        <span>Cliquer pour choisir une photo</span>
                    </label>
                </div>
                <div class="image-preview" id="previewContainer" style="display:none;">
                    <img id="previewImg" src="" alt="Aperçu">
                    <button type="button" class="preview-remove" onclick="removePreview('photo', 'previewImg')">
                        <i class="bi bi-x-circle"></i>
                    </button>
                </div>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('liste_actualite') }}" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Publier l'actualité
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
