{% extends "admin/base.html" %}
{% block title %}Modifier la formation{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('dashboard') }}">Tableau de bord</a> / <a href="{{ url_for('liste_formation') }}">Formations</a> / Modifier{% endblock %}

{% block contenu %}
<div class="page-header">
    <h2>Modifier la formation</h2>
    <a href="{{ url_for('liste_formation') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="admin-card">
    <div class="card-header"><h3><i class="bi bi-pencil-square"></i> Modifier</h3></div>
    <div class="card-body">
        <form method="POST" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="nom">Nom de la formation</label>
                    <input type="text" id="nom" name="nom" value="{{ formation.nom }}" required>
                </div>
                <div class="form-group">
                    <label for="niveau">Niveau</label>
                    <select id="niveau" name="niveau" required>
                        <option value="">-- Choisir --</option>
                        <option value="Licence" {% if formation.niveau == 'Licence' %}selected{% endif %}>Licence</option>
                        <option value="Master" {% if formation.niveau == 'Master' %}selected{% endif %}>Master</option>
                        <option value="Doctorat" {% if formation.niveau == 'Doctorat' %}selected{% endif %}>Doctorat</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="duree">Durée</label>
                    <input type="text" id="duree" name="duree" value="{{ formation.duree }}" required>
                </div>
                <div class="form-group">
                    <label for="departement_id">Département</label>
                    <select id="departement_id" name="departement_id">
                        <option value="">-- Aucun --</option>
                        {% for d in departements %}
                        <option value="{{ d.id }}" {% if formation.departement_id == d.id %}selected{% endif %}>{{ d.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="admission">Conditions d'admission</label>
                <textarea id="admission" name="admission" rows="3" required>{{ formation.admission }}</textarea>
            </div>

            <div class="form-group">
                <label for="debouches">Débouchés</label>
                <textarea id="debouches" name="debouches" rows="3" required>{{ formation.debouches }}</textarea>
            </div>

            <div class="form-group">
                <label for="programme">Programme détaillé</label>
                <textarea id="programme" name="programme" rows="8" required>{{ formation.programme }}</textarea>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('liste_formation') }}" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg"></i> Enregistrer les modifications
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
