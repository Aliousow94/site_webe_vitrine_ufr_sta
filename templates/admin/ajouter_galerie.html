{% extends "admin/base.html" %}
{% block title %}Nouvel album{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('dashboard') }}">Tableau de bord</a> / <a href="{{ url_for('liste_galerie') }}">Galerie</a> / Ajouter{% endblock %}

{% block contenu %}
<div class="page-header">
    <h2>Créer un album photo</h2>
    <a href="{{ url_for('liste_galerie') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="admin-card">
    <div class="card-header"><h3><i class="bi bi-plus-circle"></i> Nouvel album</h3></div>
    <div class="card-body">
        <form method="POST" class="admin-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="titre">Titre de l'album</label>
                    <input type="text" id="titre" name="titre" placeholder="Ex: Journée scientifique 2026" required>
                </div>
                <div class="form-group">
                    <label for="date_album">Date</label>
                    <input type="date" id="date_album" name="date_album" required>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Décrivez cet album..." required></textarea>
            </div>

            <div class="form-info">
                <i class="bi bi-info-circle"></i>
                Vous pourrez ajouter les photos après avoir créé l'album.
            </div>

            <div class="form-actions">
                <a href="{{ url_for('liste_galerie') }}" class="btn btn-secondary">Annuler</a>
                <button type="submit" class="btn btn-info">
                    <i class="bi bi-check-lg"></i> Créer l'album
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
