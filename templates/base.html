<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">


    <title>{% block title %}{% endblock %}</title>

</head>
<body>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <ul>
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
        </ul>
    {% endif %}
{% endwith %}



    <h1>UFR STA</h1>

    <nav>
        <a href="{{url_for('index')}}">Accueil</a>
        <a href="{{url_for('departement')}}">Départements</a>
        <a href="{{url_for('formation')}}">Formations</a>
        <a href="{{url_for('actualites')}}">Actualites</a>
        <a href="{{url_for('activites')}}">Activite</a>
        <a href="{{url_for('gallery')}}">Gallery</a>
        <a href="{{url_for('contact')}}">Contact</a>
        
    </nav>

    <hr>

    {% block contenu %}
    {% endblock %}

    <hr>

    <footer>
        © 2026 - UFR STA
    </footer>

</body>
</html>
